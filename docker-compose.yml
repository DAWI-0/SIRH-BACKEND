services:
  db:
    image: postgres:15
    container_name: sirh_postgres
    restart: always
    environment:
      POSTGRES_DB: sirh_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sirh_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  django:
    build: ./backend          # ou image: votre_image_django
    container_name: sirh_django
    restart: always
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://admin:admin@db:5432/sirh_db
      - REDIS_URL=redis://redis:6379
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

  n8n:
    image: n8nio/n8n
    container_name: sirh_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
    volumes:
      - n8n_data:/home/node/.n8n
      - ./:/home/node/sirh_data
    depends_on:
      - db

volumes:
  postgres_data:
  n8n_data:
  redis_data: